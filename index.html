<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TW Stock Compare - 台股走勢比較</title>

    <!-- Version: 20240512-SCREENSHOT-FIX -->

    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2422/2422796.png" type="image/png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2422/2422796.png">
    <meta name="apple-mobile-web-app-title" content="台股走勢比較">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Chart.js for charting -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Tesseract.js for OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <!-- html2canvas for Screenshot -->
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --border: #334155;
            --success: #10b981;
            --danger: #ef4444;
            --surface: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding: 1rem; /* 減少預設內距 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 0.75rem; /* 緊湊間距 */
        }

        .header {
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .header h1 {
            font-size: 1.8rem; /* 縮小標題 */
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.2rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem; /* 緊湊內距 */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .input-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .input-wrapper {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        input[type="text"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background-color: rgba(15, 23, 42, 0.5);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus {
            -webkit-text-fill-color: var(--text-main) !important;
            -webkit-box-shadow: 0 0 0px 1000px #0f172a inset !important;
            transition: background-color 5000s ease-in-out 0s;
        }

        /* 隱藏 Chrome, Safari, Edge, Opera 的上下箭頭 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            appearance: none;
            margin: 0;
        }

        /* 隱藏 Firefox 的上下箭頭 */
        input[type=number] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        .btn {
            padding: 0.4rem 0.8rem; /* 縮減桌面版內距 */
            border-radius: 8px;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem; /* 縮小圖示間距 */
        }

        .btn-primary {
            background-color: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .btn-secondary:hover {
            border-color: var(--text-muted);
            background-color: rgba(255, 255, 255, 0.05);
        }

        .upload-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .upload-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
            height: 100%;
        }

        .ranges {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .range-btn {
            padding: 0.25rem 0.6rem; /* 縮減內距 */
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .range-btn.active {
            background-color: var(--accent);
            border-color: var(--accent);
            color: white;
            font-weight: 600;
        }

        .chart-wrapper {
            display: flex;
            gap: 1.5rem;
            width: 100%;
            height: 60vh;
            min-height: 400px;
        }

        .chart-container {
            position: relative;
            flex: 1;
            height: 100%;
        }

        .performance-sidebar {
            width: 220px;
            background: rgba(15, 23, 42, 0.3);
            border-left: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            overflow-y: auto;
            backdrop-filter: blur(8px);
        }

        .performance-column {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            width: 220px;
            flex-shrink: 0;
        }

        .sidebar-header-card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            backdrop-filter: blur(8px);
        }

        .sidebar-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .perf-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.4rem;
            padding: 0.35rem 0.6rem;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
            transition: all 0.2s;
            margin-bottom: 0;
        }

        .perf-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--border);
            cursor: pointer;
        }
        
        .perf-item.active {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3) !important;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.05);
        }

        .perf-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .perf-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .perf-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }

        .perf-value {
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            text-align: right;
            white-space: nowrap;
            margin-left: 0.5rem;
        }

        .perf-up { color: var(--danger); }
        .perf-down { color: var(--success); }
        .perf-flat { color: var(--text-muted); }

        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 41, 59, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
            z-index: 10;
            border-radius: 16px;
            display: none;
            backdrop-filter: blur(4px);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-message {
            color: var(--danger);
            margin-top: 0.5rem;
            font-size: 0.9rem;
            display: none;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 20px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155;
            transition: .4s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider { background-color: #3b82f6; }
        input:checked+.slider:before { transform: translateX(16px); }

        /* --- 響應式優化 (Mobile Responsive) --- */
        @media (max-width: 768px) {
            body { padding: 0.4rem; } /* 更極簡的邊界 */
            .header h1 { font-size: 1.4rem; }
            .panel { padding: 0.6rem; } /* 縮減 Panel 內距 */
            .input-wrapper { min-width: 100%; }
            .chart-wrapper { flex-direction: column; height: auto; min-height: unset; gap: 0.75rem; }
            .chart-container { height: 45vh; min-height: 400px; width: 100%; }
            .performance-column { width: 100%; }
            .performance-sidebar { width: 100%; border-left: none; padding: 0.2rem 0; height: auto; max-height: 400px; border: none; background: transparent; backdrop-filter: none; }
            .btn { padding: 0.35rem 0.6rem; font-size: 0.8rem; } /* 縮減手機按鈕 */
            .ranges { justify-content: center; gap: 0.3rem; }
            .range-btn { padding: 0.2rem 0.5rem; font-size: 0.75rem; }
        }

        /* --- Toast Notifications --- */
        .toast-container {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
            width: calc(100% - 40px);
            max-width: 400px;
        }

        .toast {
            background: rgba(30, 41, 59, 0.98);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 14px 20px;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            font-size: 0.95rem;
            animation: toast-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @keyframes toast-in {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .toast.error { border-left: 4px solid var(--danger); }
        .toast.success { border-left: 4px solid var(--success); }
        .toast.info { border-left: 4px solid var(--accent); }

        /* Suggestions List */
        .suggestions-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .suggestion-item {
            padding: 0.6rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }

        .suggestion-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .suggestion-item span:last-child {
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .chart-tooltip-external {
            min-height: 40px;
            padding: 8px 12px;
            margin: 0 0 8px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .tooltip-title {
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 4px;
            font-size: 0.85rem;
        }
        .tooltip-body {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 12px; /* 垂直 6px, 水平 12px */
        }
        .tooltip-item {
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .tooltip-color {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>台股走勢比較</h1>
            <div id="data-info" style="font-size: 0.9rem; color: var(--text-muted);">資料日期: --</div>
        </div>

        <div class="panel">
            <div class="input-wrapper">
                <div style="display: flex; align-items: center; margin-bottom: 0.6rem; gap: 0.4rem; flex-wrap: wrap;">
                    <div class="upload-wrapper">
                        <button class="btn btn-secondary" style="padding: 0.4rem 0.6rem; font-size: 0.8rem; display: flex; align-items: center; gap: 0.4rem;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                            <span>上傳含股號的圖片</span>
                        </button>
                        <input type="file" id="file-upload" accept="image/*" onchange="handleFileUpload(event)">
                    </div>
                    <button class="btn btn-secondary" onclick="pasteFromClipboard()" style="padding: 0.4rem 0.6rem; font-size: 0.8rem; display: flex; align-items: center; gap: 0.4rem;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
                        <span>讀取已複製的文字</span>
                    </button>
                    <button class="btn btn-secondary btn-sm" onclick="addTicker('加權指數')" style="color: var(--accent); padding: 0.35rem 0.6rem; font-size: 0.8rem; border-radius: 20px; background: rgba(59, 130, 246, 0.1); border: none;">+ 加權指數</button>
                    <button class="btn btn-secondary btn-sm" onclick="addTicker('櫃買指數')" style="color: #a78bfa; padding: 0.35rem 0.6rem; font-size: 0.8rem; border-radius: 20px; background: rgba(167, 139, 250, 0.1); border: none;">+ 櫃買指數</button>
                </div>
                <div style="position: relative;">
                    <input type="text" id="tickers" placeholder="請輸入股號, 如: 0050, 2330" style="width: 100%; padding-right: 2.5rem;" autocomplete="off">
                    <button onclick="clearTickers()" id="clear-input-btn" style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; display: none; font-size: 1.1rem; filter: grayscale(1); opacity: 0.7;">🗑️</button>
                    <div id="suggestions" class="suggestions-list"></div>
                </div>
                <div style="display: flex; gap: 0.5rem; margin-top: 0.6rem;">
                    <button class="btn btn-primary" onclick="drawChart()" style="padding: 0.5rem 1rem; font-size: 0.95rem;">開始比較</button>
                    <button class="btn btn-secondary" onclick="shareScreenshot()" style="padding: 0.4rem 0.8rem; font-size: 0.9rem; border-radius: 8px; display: flex; align-items: center; gap: 0.4rem; border: 1px solid rgba(255,255,255,0.1);">
                        <span>📸 截圖分享</span>
                    </button>
                </div>
                <div id="error-msg" class="error-message"></div>
            </div>

            <div class="ranges" style="margin-top: 1rem; align-items: center; gap: 0.4rem; flex-wrap: wrap;">
                <div style="display: flex; align-items: center; gap: 0.3rem; margin-right: 0.2rem; padding: 0.15rem 0;">
                    <span style="font-size: 0.75rem; color: var(--text-muted);">近</span>
                    <input type="number" id="custom-days" value="20" style="width: 35px; background: transparent; border: none; color: var(--text-main); font-weight: bold; text-align: center; outline: none; font-size: 0.85rem;">
                    <span style="font-size: 0.75rem; color: var(--text-muted);">日</span>
                    <button class="range-btn" onclick="setCustomRange(this)" style="padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.75rem;">自訂</button>
                </div>
                <button class="range-btn" data-range="5d" onclick="setRange('5d', this)">5日</button>
                <button class="range-btn" data-range="10d" onclick="setRange('10d', this)">10日</button>
                <button class="range-btn" data-range="20d" onclick="setRange('20d', this)">20日</button>
                <button class="range-btn" data-range="60d" onclick="setRange('60d', this)">60日</button>
                <button class="range-btn" data-range="1y" onclick="setRange('1y', this)">1年</button>
                <button class="range-btn active" data-range="ytd" onclick="setRange('ytd', this)">今年</button>
            </div>
        </div>

        <div class="panel" id="chart-panel" style="position: relative; overflow: hidden; background-color: var(--panel-bg);">
            <div id="loading">
                <div class="spinner"></div>
                <div id="loading-text">正在讀取資料...</div>
            </div>
            <!-- 外部提示框卡片 -->
            <div id="chart-tooltip-external" class="chart-tooltip-external"></div>
            
            <div class="chart-wrapper">
                <div class="chart-container">
                    <canvas id="stockChart"></canvas>
                </div>
                <div class="performance-column">
                    <!-- 新增標題與開關卡片 -->
                    <div class="sidebar-header-card">
                        <div class="sidebar-title" style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 0;">
                            <span>累計漲跌幅</span>
                            <div style="display: flex; align-items: center; gap: 0.4rem; scale: 0.85; transform-origin: right;">
                                <span style="font-size: 0.75rem; color: var(--text-muted); font-weight: normal; text-transform: none;">還原股價</span>
                                <label class="switch">
                                    <input type="checkbox" id="adj-toggle" onchange="toggleAdjusted()">
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 漲跌幅列表 (維持可捲動) -->
                    <div class="performance-sidebar" id="performance-sidebar">
                        <div id="performance-list"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div style="text-align: center; margin-top: 1rem; opacity: 0.5;">
            <button class="btn btn-secondary btn-sm" onclick="clearFullCache()" style="font-size: 0.75rem; padding: 0.3rem 0.6rem;">清除完整快取</button>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script>
        let currentChart = null;
        let selectedRange = 'ytd';
        let isAdjusted = false;
        let isFetchingData = false;
        const STORAGE_KEY = 'stock_compare_cache_v3';
        let stockCache = {};
        let tickerNames = {};

        // 註冊 Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('SW registered:', reg);
                }).catch(err => {
                    console.log('SW registration failed:', err);
                });
            });
        }

        const colors = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4'];
        const tickerMap = { '加權指數': 'TAIEX', '大盤': 'TAIEX', '櫃買指數': 'TPEx', 'OTC': 'TPEx' };

        function loadCache() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    stockCache = parsed.stocks || {};
                    tickerNames = parsed.names || {};
                }
                tickerNames['TAIEX'] = '加權指數'; tickerNames['TPEx'] = '櫃買指數';
            } catch (e) {}
        }
        loadCache();

        function saveCache() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ stocks: stockCache, names: tickerNames }));
            } catch (e) {
                console.warn("存檔失敗 (空間可能已滿)");
            }
        }

        let activeProxyIndex = 0;
        const PUBLIC_PROXIES = [
            'https://corsproxy.io/?',
            'https://api.allorigins.win/raw?url=',
            'https://proxy.cors.sh/',
            'https://api.codetabs.com/v1/proxy?url='
        ];

        function getProxyUrl(targetUrl, proxyIndex = -1) {
            const isLocal = window.location.hostname === 'localhost' || 
                            window.location.hostname === '127.0.0.1' || 
                            window.location.hostname.startsWith('192.168.');
            
            // 如果 proxyIndex 為 -2，強制使用本地代理
            if (proxyIndex === -2) return `/proxy?url=${encodeURIComponent(targetUrl)}`;
            // 如果指定了具體的公用代理索引
            if (proxyIndex >= 0) return PUBLIC_PROXIES[proxyIndex] + encodeURIComponent(targetUrl);
            
            // 預設邏輯：本地優先，否則使用目前啟用的公用代理
            if (isLocal && activeProxyIndex === -1) return `/proxy?url=${encodeURIComponent(targetUrl)}`;
            return PUBLIC_PROXIES[activeProxyIndex >= 0 ? activeProxyIndex : 0] + encodeURIComponent(targetUrl);
        }

        async function fetchWithTimeout(url, options = {}, timeout = 5000) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            try {
                const response = await fetch(url, { ...options, signal: controller.signal });
                clearTimeout(id);
                return response;
            } catch (e) {
                clearTimeout(id);
                throw e;
            }
        }

        let lastProxyCheckTime = 0;
        let isProxyHealthy = false;

        async function testProxyHealth() {
            if (isProxyHealthy && Date.now() - lastProxyCheckTime < 600000) return true;
            
            const testUrl = 'https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockInfo&data_id=0050';
            const isLocal = window.location.hostname === 'localhost' || 
                            window.location.hostname === '127.0.0.1' || 
                            window.location.hostname.startsWith('192.168.');

            // 1. 如果在本地，先試試本地代理 (activeProxyIndex = -1 表示本地)
            if (isLocal) {
                try {
                    const res = await fetchWithTimeout(getProxyUrl(testUrl, -2), {}, 3000);
                    if (res.ok) {
                        activeProxyIndex = -1;
                        isProxyHealthy = true;
                        lastProxyCheckTime = Date.now();
                        return true;
                    }
                } catch (e) { console.warn("Local proxy failed, trying public ones..."); }
            }

            // 2. 嘗試公用代理
            for (let i = 0; i < PUBLIC_PROXIES.length; i++) {
                try {
                    const res = await fetchWithTimeout(getProxyUrl(testUrl, i), {}, 5000);
                    if (res.ok) {
                        activeProxyIndex = i;
                        isProxyHealthy = true;
                        lastProxyCheckTime = Date.now();
                        return true;
                    }
                } catch (e) { console.warn(`Public proxy ${i} failed...`); }
            }
            return false;
        }

        function getLatestTargetDate() {
            const now = new Date();
            const timeVal = now.getHours() * 100 + now.getMinutes();
            const target = new Date(now);
            // 如果還沒下午 1:30 (台股收盤)，抓前一天的資料
            if (timeVal < 1330) target.setDate(target.getDate() - 1);
            // 處理週末
            if (target.getDay() === 0) target.setDate(target.getDate() - 2);
            else if (target.getDay() === 6) target.setDate(target.getDate() - 1);
            return target.toISOString().split('T')[0];
        }

        async function fetchTickerName(ticker) {
            if (tickerNames[ticker] || ticker === 'TAIEX' || ticker === 'TPEx') return;
            try {
                const res = await fetchWithTimeout(getProxyUrl('https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockInfo'), {}, 8000);
                const json = await res.json();
                if (json.data) {
                    json.data.forEach(item => { if (item.stock_id) tickerNames[item.stock_id] = item.stock_name; });
                    saveCache();
                }
            } catch (e) {}
        }

        async function fetchFinMind(ticker) {
            try {
                const d = new Date(); d.setFullYear(d.getFullYear() - 2);
                const url = getProxyUrl(`https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${ticker}&start_date=${d.toISOString().split('T')[0]}`);
                const res = await fetchWithTimeout(url, {}, 8000);
                const json = await res.json();
                if (json.data && json.data.length > 0) {
                    return { timestamps: json.data.map(i => i.date), prices: json.data.map(i => i.close) };
                }
            } catch (e) {} return null;
        }

        async function fetchStockData(rawTicker, range, isAdjusted) {
            const ticker = tickerMap[rawTicker] || rawTicker;
            const cacheKey = ticker + (isAdjusted ? '_adj' : '_raw');
            const targetDate = getLatestTargetDate();
            const startDate = getStartDate(range);

            // 檢查快取
            if (stockCache[cacheKey]) {
                const cached = stockCache[cacheKey];
                const lastFetch = cached.lastFetch || 0;
                const now = Date.now();
                // 優化判斷：如果資料日期已達標，或是「1小時內」才抓過，就直接使用快取
                if (cached.timestamps[cached.timestamps.length - 1] >= targetDate || (now - lastFetch < 3600000)) {
                    return filterResult(rawTicker, cached, startDate);
                }
            }
            
            let yt = ticker;
            if (ticker === 'TAIEX') yt = '^TWII';
            else if (ticker === 'TPEx') yt = '^TWOII';

            // 1. 如果是非還原股價，優先嘗試 FinMind
            if (!isAdjusted && !yt.startsWith('^')) {
                const fmData = await fetchFinMind(ticker);
                if (fmData) {
                    fmData.lastFetch = Date.now(); // 修復：加入最後抓取時間，避免 FinMind 資料未更新時不斷重複抓取
                    stockCache[cacheKey] = fmData; saveCache();
                    return filterResult(rawTicker, fmData, startDate);
                }
            }

            // 2. 使用 Yahoo Finance (含時區修正)
            const tryYahoo = async (symbol) => {
                try {
                    const url = getProxyUrl(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=2y&includeAdjClose=true`);
                    const res = await fetchWithTimeout(url, {}, 10000);
                    const json = await res.json();
                    if (!json.chart || !json.chart.result) return null;
                    const r = json.chart.result[0];
                    // 時區修正：Yahoo 是 UTC，轉為在地時間
                    const ts = r.timestamp.map(t => new Date(t * 1000 - new Date().getTimezoneOffset()*60000).toISOString().split('T')[0]);
                    const pr = isAdjusted ? r.indicators.adjclose[0].adjclose : r.indicators.quote[0].close;
                    return { timestamps: ts, prices: pr };
                } catch (e) { return null; }
            };

            let result = null;
            if (yt.startsWith('^')) {
                result = await tryYahoo(yt);
            } else {
                result = await tryYahoo(ticker + '.TW') || await tryYahoo(ticker + '.TWO') || await tryYahoo(ticker);
            }

            if (result) { 
                result.lastFetch = Date.now(); // 紀錄這次成功抓取的時間
                stockCache[cacheKey] = result; 
                saveCache(); 
            }
            return result ? filterResult(rawTicker, result, startDate) : null;
        }

        function getStartDate(range) {
            const d = new Date();
            if (range === 'ytd') {
                d.setMonth(0, 1);
            } else if (range.startsWith('custom_')) {
                const days = parseInt(range.split('_')[1]);
                if (!isNaN(days)) d.setDate(d.getDate() - Math.ceil(days * 1.5));
            } else if (range.endsWith('d')) {
                const days = parseInt(range);
                if (!isNaN(days)) d.setDate(d.getDate() - Math.ceil(days * 1.5));
            } else if (range === '1y') {
                d.setFullYear(d.getFullYear() - 1);
            }
            return d.toISOString().split('T')[0];
        }

        function filterResult(ticker, data, start) {
            const ts = [], pr = [];
            data.timestamps.forEach((t, i) => { if (t >= start && data.prices[i]) { ts.push(t); pr.push(data.prices[i]); } });
            return ts.length ? { ticker, timestamps: ts, prices: pr } : null;
        }

        async function drawChart() {
            if (isFetchingData) return;
            isFetchingData = true;
            showLoading("正在準備連線...");
            
            try {
                const input = document.getElementById('tickers').value;
                let codes = input.split(/[,，\s]+/).map(s => s.trim()).filter(s => s);
                if (!codes.length) throw new Error("請輸入股號");

                // 排序邏輯：加權指數 > 櫃買指數 > 股號小到大
                codes.sort((a, b) => {
                    const order = { '加權指數': 1, '大盤': 1, 'TAIEX': 1, '櫃買指數': 2, 'OTC': 2, 'TPEx': 2 };
                    const valA = order[a] || 3;
                    const valB = order[b] || 3;
                    if (valA !== valB) return valA - valB;
                    return a.localeCompare(b, undefined, { numeric: true });
                });
                
                // 更新輸入框顯示排序後的結果
                document.getElementById('tickers').value = codes.join(', ') + (codes.length > 0 ? ', ' : '');

                const isHealthy = await testProxyHealth();
                if (!isHealthy) throw new Error("所有連線代理均失效，請檢查網路。");

                showLoading("正在獲取最新股價...");
                isAdjusted = document.getElementById('adj-toggle').checked;
                
                const fetchPromises = codes.map(async (c) => {
                    await fetchTickerName(c);
                    return await fetchStockData(c, selectedRange, isAdjusted);
                });

                const results = (await Promise.all(fetchPromises)).filter(r => r);
                
                if (!results.length) throw new Error("找不到任何有效的股價資料");

                const allTs = new Set();
                results.forEach(r => r.timestamps.forEach(t => allTs.add(t)));
                const sortedDates = Array.from(allTs).sort();

                const datasets = results.map((r, i) => {
                    const priceMap = {}; r.timestamps.forEach((t, idx) => priceMap[t] = r.prices[idx]);
                    const prices = sortedDates.map(d => priceMap[d] || null);
                    
                    let last = null;
                    for(let j=0; j<prices.length; j++) { 
                        if (prices[j]) last = prices[j]; 
                        else prices[j] = last; 
                    }
                    
                    const base = prices.find(p => p > 0);
                    const name = tickerNames[r.ticker] || r.ticker;
                    const displayLabel = (r.ticker === 'TAIEX' || r.ticker === 'TPEx') ? name : `${name}(${r.ticker})`;
                    
                    return {
                        label: displayLabel,
                        data: prices.map(p => p ? ((p - base)/base*100).toFixed(2) : null),
                        borderColor: colors[i % colors.length],
                        borderWidth: 2, pointRadius: 0, tension: 0.1
                    };
                });

                renderChart(sortedDates, datasets);
                updatePerformanceSidebar(datasets);
                document.getElementById('data-info').innerText = `最後更新: ${sortedDates[sortedDates.length-1]}`;
                // 移除更新成功的通知，讓頻繁操作更順暢
                // showToast(`已成功載入 ${results.length} 檔標的`, "success");
            } catch (e) { 
                showToast(e.message, "error");
            } finally { 
                isFetchingData = false; 
                hideLoading(); 
            }
        }

        function renderChart(labels, datasets) {
            const ctx = document.getElementById('stockChart').getContext('2d');
            if (currentChart) currentChart.destroy();
            const isMobile = window.innerWidth < 768;

            currentChart = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    layout: {
                        padding: { 
                            top: 10,
                            bottom: isMobile ? 15 : 30 
                        }
                    },
                    interaction: { mode: 'index', intersect: false },
                    plugins: { 
                        legend: { display: false },
                        tooltip: { 
                            enabled: false,
                            external: function(context) {
                                const {chart, tooltip} = context;
                                const tooltipEl = document.getElementById('chart-tooltip-external');
                                if (tooltip.opacity === 0) {
                                    tooltipEl.innerHTML = '';
                                    return;
                                }
                                if (tooltip.body) {
                                    const titleLines = tooltip.title || [];
                                    const bodyLines = tooltip.body.map(b => b.lines);
                                    let innerHtml = `<div class="tooltip-title">${titleLines[0]}</div>`;
                                    innerHtml += `<div class="tooltip-body">`;
                                    bodyLines.forEach((body, i) => {
                                        const colors = tooltip.labelColors[i];
                                        // 取得原始標籤與數值，並補上 %
                                        const text = body[0];
                                        innerHtml += `
                                            <div class="tooltip-item">
                                                <span class="tooltip-color" style="background:${colors.borderColor}; border: 1px solid rgba(255,255,255,0.2);"></span>
                                                ${text}%
                                            </div>`;
                                    });
                                    innerHtml += `</div>`;
                                    tooltipEl.innerHTML = innerHtml;
                                }
                            }
                        }
                    },
                    scales: {
                        x: { 
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: {
                                color: '#94a3b8',
                                font: { size: isMobile ? 9 : 11 },
                                autoSkip: false,
                                maxRotation: 0,
                                minRotation: 0,
                                callback: function (val, index) {
                                    const allLabels = this.chart.data.labels;
                                    const total = allLabels.length;
                                    if (!this.smartShown) {
                                        this.smartShown = new Array(total).fill(false);
                                        // 手機版間距加大一點，避免水平文字重疊
                                        const step = Math.max(1, Math.ceil(total / (isMobile ? 5 : 12)));
                                        let lastIdx = -999;
                                        for (let i = 0; i < total; i++) {
                                            const isYC = i > 0 && allLabels[i].split('-')[0] !== allLabels[i-1].split('-')[0];
                                            // 優先顯示：起點、終點、跨年點
                                            if (i === 0 || i === total - 1 || isYC) { 
                                                this.smartShown[i] = true; 
                                                lastIdx = i; 
                                            }
                                        }
                                        // 填補中間點
                                        lastIdx = 0;
                                        for (let i = 1; i < total - 1; i++) {
                                            if (this.smartShown[i]) { lastIdx = i; continue; }
                                            if (i - lastIdx >= step) {
                                                // 檢查是否距離下一個優先點太近
                                                let nextPriority = total - 1;
                                                for (let j = i + 1; j < total; j++) {
                                                    if (this.smartShown[j]) { nextPriority = j; break; }
                                                }
                                                if (nextPriority - i >= step * 0.8) {
                                                    this.smartShown[i] = true;
                                                    lastIdx = i;
                                                }
                                            }
                                        }
                                    }
                                    if (!this.smartShown[index]) return '';
                                    const d = allLabels[index];
                                    const parts = d.split('-');
                                    const isYC = index > 0 && allLabels[index].split('-')[0] !== allLabels[index-1].split('-')[0];
                                    // 起點或跨年點顯示年份
                                    if (index === 0 || isYC) return [parts[1]+'-'+parts[2], parts[0]];
                                    // 中間點或終點只顯示月日
                                    return parts[1]+'-'+parts[2];
                                }
                            }
                        },
                        y: {
                            grace: '10%',
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: {
                                color: '#94a3b8',
                                font: { size: isMobile ? 10 : 12 },
                                callback: val => val + '%'
                            }
                        }
                    }
                }
            });
        }

        function updatePerformanceSidebar(datasets) {
            const list = document.getElementById('performance-list');
            list.innerHTML = '';
            datasets.forEach((ds, i) => {
                const val = parseFloat(ds.data[ds.data.length - 1]);
                const item = document.createElement('div');
                item.className = 'perf-item';
                item.id = `perf-item-${i}`;
                item.style.borderLeft = `4px solid ${ds.borderColor}`;
                item.onclick = () => highlightDataset(i);
                
                const isUp = val >= 0;
                const sign = isUp ? '+' : '';
                
                item.innerHTML = `
                    <div class="perf-name">${ds.label}</div>
                    <div class="perf-value ${isUp ? 'perf-up' : 'perf-down'}">${sign}${val}%</div>
                `;
                list.appendChild(item);
            });
        }

        let highlightedIndex = -1;
        function highlightDataset(index) {
            if (!currentChart) return;
            
            const datasets = currentChart.data.datasets;
            
            // 如果點擊的是同一個，則取消高亮
            if (highlightedIndex === index) {
                highlightedIndex = -1;
            } else {
                highlightedIndex = index;
            }

            datasets.forEach((ds, i) => {
                const item = document.getElementById(`perf-item-${i}`);
                if (highlightedIndex === -1) {
                    // 恢復原狀
                    ds.borderWidth = 2;
                    ds.borderColor = colors[i % colors.length];
                    if (item) item.classList.remove('active');
                } else if (i === highlightedIndex) {
                    // 高亮目標
                    ds.borderWidth = 5;
                    ds.borderColor = colors[i % colors.length]; // 確保顏色恢復為完全不透明
                    if (item) item.classList.add('active');
                } else {
                    // 弱化其他
                    ds.borderWidth = 1;
                    // 增加透明度
                    const baseColor = colors[i % colors.length];
                    ds.borderColor = baseColor + '44'; // 加入 alpha (0.25)
                    if (item) item.classList.remove('active');
                }
            });
            
            currentChart.update('none'); // 使用 'none' 避免全量重繪動畫過大，或 'active'
        }

        async function processImage(src) {
            showLoading("辨識中 (含中文)...");
            try {
                // 使用中英雙語模型
                const worker = await Tesseract.createWorker('eng+chi_tra');
                const ret = await worker.recognize(src);
                await worker.terminate();
                
                const text = ret.data.text;
                console.log("OCR Result:", text);

                // 1. 提取股號 (4-6 位數字)
                const codeMatches = text.match(/\b\d{4,6}\b/g) || [];
                
                // 2. 嘗試從文字中尋找已知的股票名稱並轉為股號
                const nameMatches = [];
                if (Object.keys(tickerNames).length > 10) {
                    for (const [id, name] of Object.entries(tickerNames)) {
                        if (name && name.length >= 2 && text.includes(name)) {
                            nameMatches.push(id);
                        }
                    }
                }

                const finalCodes = [...new Set([...codeMatches, ...nameMatches])];
                
                if (finalCodes.length > 0) {
                    const input = document.getElementById('tickers');
                    const existing = input.value.split(/[,，\s]+/).filter(s => s);
                    input.value = [...new Set([...existing, ...finalCodes])].join(', ') + ', ';
                    document.getElementById('clear-input-btn').style.display = 'block';
                    showToast(`辨識成功：提取到 ${finalCodes.length} 檔標的`, "success");
                    drawChart();
                } else {
                    showToast("未能辨識出有效的股號或名稱", "info");
                }
            } catch (e) { 
                console.error(e);
                showToast("辨識失敗", "error"); 
            } finally { 
                hideLoading(); 
            }
        }

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                if (!text) return showToast("剪貼簿為空", "info");
                
                // 1. 提取股號 (4-6 位數字)
                const codeMatches = text.match(/\b\d{4,6}\b/g) || [];
                
                // 2. 嘗試從文字中尋找已知的股票名稱並轉為股號
                const nameMatches = [];
                const searchNames = Object.entries(tickerNames).filter(([id, name]) => name && name.length >= 2);
                
                searchNames.forEach(([id, name]) => {
                    if (text.includes(name)) nameMatches.push(id);
                });

                const finalCodes = [...new Set([...codeMatches, ...nameMatches])];

                if (finalCodes.length > 0) {
                    const input = document.getElementById('tickers');
                    const existing = input.value.split(/[,，\s]+/).filter(s => s);
                    input.value = [...new Set([...existing, ...finalCodes])].join(', ') + ', ';
                    document.getElementById('clear-input-btn').style.display = 'block';
                    showToast(`已從剪貼簿提取 ${finalCodes.length} 檔標的`, "success");
                    drawChart();
                } else {
                    showToast("剪貼簿中找不到有效的股號或名稱", "info");
                }
            } catch (err) {
                showToast("無法存取剪貼簿", "error");
            }
        }

        function clearFullCache() {
            if (confirm("即將清除本機快取檔案，確定要繼續嗎？")) {
                localStorage.clear();
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(registrations => {
                        for (let registration of registrations) {
                            registration.unregister();
                        }
                        caches.keys().then(names => {
                            for (let name of names) caches.delete(name);
                            location.reload(true);
                        });
                    });
                } else {
                    location.reload(true);
                }
            }
        }

        function showLoading(t) { 
            document.getElementById('loading-text').innerText = t; 
            document.getElementById('loading').style.display = 'flex'; 
        }

        function hideLoading() { 
            document.getElementById('loading').style.display = 'none'; 
        }

        function setCustomRange(btn) {
            const days = document.getElementById('custom-days').value;
            if (!days || days <= 0) return showToast("請輸入有效天數", "error");
            selectedRange = `custom_${days}`;
            document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

        function showToast(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            let icon = 'ℹ️';
            if (type === 'error') icon = '⚠️';
            if (type === 'success') icon = '✅';
            
            toast.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px)';
                toast.style.transition = 'all 0.4s ease';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // 監聽輸入框顯示/隱藏清除按鈕與建議
        const tickerInput = document.getElementById('tickers');
        tickerInput.addEventListener('input', function() {
            const val = this.value;
            document.getElementById('clear-input-btn').style.display = val ? 'block' : 'none';
            
            // 抓取最後一個逗號後的文字進行建議
            const parts = val.split(/[,，\s]+/);
            const lastPart = parts[parts.length - 1].trim();
            
            if (lastPart.length >= 2) {
                showSuggestions(lastPart);
            } else {
                hideSuggestions();
            }
        });

        function showSuggestions(query) {
            const suggestions = document.getElementById('suggestions');
            const matches = [];
            const q = query.toUpperCase();
            
            // 搜尋快取中的名稱與代碼
            for (const [id, name] of Object.entries(tickerNames)) {
                if (id.includes(q) || (name && name.includes(q))) {
                    matches.push({ id, name });
                    if (matches.length >= 10) break;
                }
            }
            
            if (matches.length > 0) {
                suggestions.innerHTML = matches.map(m => `
                    <div class="suggestion-item" onclick="applySuggestion('${m.id}')">
                        <span>${m.name || ''}</span>
                        <span>${m.id}</span>
                    </div>
                `).join('');
                suggestions.style.display = 'block';
            } else {
                hideSuggestions();
            }
        }

        function hideSuggestions() {
            document.getElementById('suggestions').style.display = 'none';
        }

        function applySuggestion(id) {
            const input = document.getElementById('tickers');
            const parts = input.value.split(/[,，\s]+/);
            parts[parts.length - 1] = id;
            input.value = parts.filter(s => s).join(', ') + ', ';
            hideSuggestions();
            input.focus();
        }

        async function shareScreenshot() {
            const tickers = document.getElementById('tickers').value;
            if (!tickers) return showToast("請先輸入股號並點擊比較", "info");
            
            showLoading("正在產生截圖...");
            try {
                const panel = document.getElementById('chart-panel');
                
                // 使用 html2canvas 捕捉區塊
                const canvas = await html2canvas(panel, {
                    backgroundColor: '#1e293b', // var(--panel-bg)
                    scale: 2, // 提高解析度
                    logging: false,
                    useCORS: true, // 允許跨域圖片 (如果有用到)
                    onclone: (clonedDoc) => {
                        // 在截圖前隱藏不需要的元件，例如 loading 遮罩
                        clonedDoc.getElementById('loading').style.display = 'none';
                        
                        // 強制展開「累計漲跌幅」列表，以顯示完整股票清單
                        const sidebar = clonedDoc.getElementById('performance-sidebar');
                        if (sidebar) {
                            sidebar.style.maxHeight = 'none';
                            sidebar.style.height = 'auto';
                            sidebar.style.overflow = 'visible';
                        }
                        
                        // 確保容器也能自動撐開
                        const panel = clonedDoc.getElementById('chart-panel');
                        if (panel) {
                            panel.style.height = 'auto';
                            panel.style.maxHeight = 'none';
                            panel.style.overflow = 'visible';
                        }

                        const wrapper = clonedDoc.querySelector('.chart-wrapper');
                        if (wrapper) {
                            // 手機版原本就是 auto，但在電腦版是 60vh，這裡統一設為 auto 以便撐開
                            wrapper.style.height = 'auto';
                        }
                    }
                });

                const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png', 0.9));
                const file = new File([blob], `stock_compare_${new Date().getTime()}.png`, { type: 'image/png' });

                // 優先使用 Web Share API
                if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: '台股走勢比較',
                        text: `這是我的台股走勢比較截圖 (${tickers})`
                    });
                } else {
                    // 備案：下載圖片
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `stock_compare_${new Date().getTime()}.png`;
                    a.click();
                    URL.revokeObjectURL(url);
                    showToast("瀏覽器不支持直接分享圖片，已為您下載截圖", "success");
                }
            } catch (e) {
                console.error(e);
                showToast("截圖失敗: " + e.message, "error");
            } finally {
                hideLoading();
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast("連結已複製到剪貼簿", "success");
            });
        }

        // 點擊外部隱藏建議
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.input-wrapper')) hideSuggestions();
        });

        window.onload = () => {
            // 從 URL 參數讀取股號
            const params = new URLSearchParams(window.location.search);
            const t = params.get('t');
            if (t) {
                document.getElementById('tickers').value = t.replace(/,/g, ', ');
                document.getElementById('clear-input-btn').style.display = 'block';
                drawChart();
            } else {
                // 否則清空
                document.getElementById('tickers').value = '';
            }
            
            // 預先載入股票名稱清單 (如果快取中沒有)
            if (Object.keys(tickerNames).length < 10) {
                fetchTickerName('0050');
            }
        };
    </script>
</body>
